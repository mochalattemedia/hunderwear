<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — Hunderwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0D1B2A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .logo span { color: #C0392B; }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 8vw, 5.5rem);
      text-transform: uppercase;
      line-height: 0.95;
      margin-bottom: 24px;
    }
    h1 span { color: #C0392B; }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    a {
      color: rgba(255,255,255,0.3);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
    }
    a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="logo">H<span>underwear</span></div>
  <h1>You're<br>on the <span>list.</span></h1>
  <p>We'll be in touch before the first production run. Play hard out there.</p>
  <a href="/">← Back to home</a>
</body>
</html>
